    <text x="22" y="51" fill="#9FB3C8" font-family="Inter, Arial, sans-serif" font-size="11">Review evidence</text>
  </g>
  <g transform="translate(690,204)">
    <rect width="170" height="58" rx="16" fill="#101F33" stroke="#2B3C54" stroke-width="1.5"/>
    <text x="22" y="35" fill="#E6F3FF" font-family="Inter, Arial, sans-serif" font-size="15" font-weight="700">Operations</text>
    <text x="22" y="51" fill="#9FB3C8" font-family="Inter, Arial, sans-serif" font-size="11">See trends</text>
  </g>
  <g transform="translate(690,276)">
    <rect width="170" height="58" rx="16" fill="#101F33" stroke="#2B3C54" stroke-width="1.5"/>
    <text x="22" y="35" fill="#E6F3FF" font-family="Inter, Arial, sans-serif" font-size="15" font-weight="700">Maintenance</text>
    <text x="22" y="51" fill="#9FB3C8" font-family="Inter, Arial, sans-serif" font-size="11">Use machine context</text>
  </g>
  <g transform="translate(690,348)">
    <rect width="170" height="58" rx="16" fill="#101F33" stroke="#2B3C54" stroke-width="1.5"/>
    <text x="22" y="35" fill="#E6F3FF" font-family="Inter, Arial, sans-serif" font-size="15" font-weight="700">Enterprise</text>
    <text x="22" y="51" fill="#9FB3C8" font-family="Inter, Arial, sans-serif" font-size="11">Approved visibility</text>
  </g>

  <g transform="translate(60,336)">
    <rect width="266" height="76" rx="18" fill="#101F33" stroke="#2B3C54" stroke-width="1.5"/>
    <text x="24" y="32" fill="#E6F3FF" font-family="Inter, Arial, sans-serif" font-size="15" font-weight="700">Production line stays secure</text>
    <text x="24" y="55" fill="#9FB3C8" font-family="Inter, Arial, sans-serif" font-size="12">The machine runs on the line while authorized users review cloud data.</text>
  </g>

  <g transform="translate(60,444)">
    <rect width="800" height="52" rx="16" fill="#081321" stroke="#203044" stroke-width="1"/>
    <circle cx="30" cy="26" r="9" fill="#39D0C8"/>
    <text x="50" y="31" fill="#D7E8F8" font-family="Inter, Arial, sans-serif" font-size="14">IT review: access, roles, data separation, updates, backups, support responsibilities</text>
